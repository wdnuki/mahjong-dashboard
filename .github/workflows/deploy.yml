name: Deploy Mahjong Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode: all | functions | hosting'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - functions
          - hosting

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── GCP Service Account JSON をデコード ──────────────────────────────
      - name: Decode GCP Service Account
        run: |
          if [[ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]]; then
            echo "::error::GCP_SERVICE_ACCOUNT_KEY secret が設定されていません。"
            exit 1
          fi
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 --decode > /tmp/sa-key.json
          if ! python3 -c "import json; d=json.load(open('/tmp/sa-key.json')); assert 'private_key' in d" 2>/dev/null; then
            echo "::error::GCP_SERVICE_ACCOUNT_KEY の内容が有効な Service Account JSON ではありません。"
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> "$GITHUB_ENV"
          echo "✓ GCP Service Account を展開しました"

      # ── Docker Buildx + レイヤーキャッシュ ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'functions/package-lock.json', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build deploy image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mahjong-dashboard-deploy:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── デプロイ実行 ──────────────────────────────────────────────────────
      - name: Deploy
        run: |
          DEPLOY_MODE="${{ github.event.inputs.mode || 'all' }}"
          echo "Deploy mode: $DEPLOY_MODE"

          docker run --rm \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json \
            -v /tmp/sa-key.json:/tmp/sa-key.json:ro \
            -v "${{ github.workspace }}:/workspace/mahjong-dashboard:ro" \
            mahjong-dashboard-deploy:ci \
            bash deploy.sh "$DEPLOY_MODE"

      # ── Docker キャッシュのローテーション ────────────────────────────────
      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── クリーンアップ ────────────────────────────────────────────────────
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa-key.json
