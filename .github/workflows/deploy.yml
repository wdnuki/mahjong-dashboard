name: Deploy Mahjong Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode: all | gas | flutter'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gas
          - flutter

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── clasp 認証情報をデコード ──────────────────────────────────────────
      # CLASPRC_JSON secret: base64 -w 0 ~/.clasprc.json で生成
      - name: Validate CLASPRC_JSON secret
        run: |
          if [[ -z "${{ secrets.CLASPRC_JSON }}" ]]; then
            echo "::error::CLASPRC_JSON secret が設定されていません。"
            echo "::error::ホストマシンで bash scripts/setup_auth.sh を実行し、表示された値を Secret に登録してください。"
            exit 1
          fi
          # デコードして token フィールドが存在するか検証
          echo "${{ secrets.CLASPRC_JSON }}" | base64 --decode > /tmp/clasprc-check.json
          if ! grep -q '"token"' /tmp/clasprc-check.json; then
            echo "::error::CLASPRC_JSON の内容が無効です（\"token\" フィールドなし）。"
            echo "::error::clasp login 後に ~/.clasprc.json を再エンコードして Secret を更新してください。"
            rm -f /tmp/clasprc-check.json
            exit 1
          fi
          rm -f /tmp/clasprc-check.json
          echo "✓ CLASPRC_JSON が有効です"

      # ── GCP Service Account JSON をデコード ──────────────────────────────
      # GCP_SERVICE_ACCOUNT_KEY secret: base64 -w 0 sa.json で生成
      - name: Decode GCP Service Account
        run: |
          if [[ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]]; then
            echo "::error::GCP_SERVICE_ACCOUNT_KEY secret が設定されていません。"
            echo "::error::GCP Console で Service Account JSON を取得し、setup_auth.sh の手順で登録してください。"
            exit 1
          fi
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 --decode > /tmp/sa-key.json
          # 簡易検証
          if ! python3 -c "import json; d=json.load(open('/tmp/sa-key.json')); assert 'private_key' in d" 2>/dev/null; then
            echo "::error::GCP_SERVICE_ACCOUNT_KEY の内容が有効な Service Account JSON ではありません。"
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> "$GITHUB_ENV"
          echo "✓ GCP Service Account を展開しました"

      # ── Docker Buildx + レイヤーキャッシュ ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'gas_api/package-lock.json', 'flutter_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build deploy image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mahjong-dashboard-deploy:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── デプロイ実行 ──────────────────────────────────────────────────────
      - name: Deploy
        run: |
          DEPLOY_MODE="${{ github.event.inputs.mode || 'all' }}"
          echo "Deploy mode: $DEPLOY_MODE"

          docker run --rm \
            -e CLASPRC_JSON="${{ secrets.CLASPRC_JSON }}" \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json \
            -v /tmp/sa-key.json:/tmp/sa-key.json:ro \
            -v "${{ github.workspace }}:/workspace/mahjong-dashboard:ro" \
            mahjong-dashboard-deploy:ci \
            bash deploy.sh "$([[ "$DEPLOY_MODE" == "all" ]] && echo '' || echo "--${DEPLOY_MODE}-only")"

      # ── Docker キャッシュのローテーション ────────────────────────────────
      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── クリーンアップ ────────────────────────────────────────────────────
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa-key.json /tmp/clasprc-check.json
