services:
  deploy:
    build: .
    image: mahjong-dashboard-local:latest
    volumes:
      # プロジェクトソース (ライブマウント)
      - .:/workspace
      # Flutter パッケージキャッシュ
      - pub-cache:/root/.pub-cache
    environment:
      # firebase login:ci で取得したトークンを .env に設定する
      - FIREBASE_TOKEN=${FIREBASE_TOKEN:?Run 'firebase login:ci' and set FIREBASE_TOKEN in .env}
    working_dir: /workspace
    command: bash deploy.sh all
    stdin_open: true
    tty: true

volumes:
  pub-cache:
